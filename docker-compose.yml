version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hospital-orchestrator-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hospital_orchestrator
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
